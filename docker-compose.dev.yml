services:
  postgres:
    image: postgres:17
    container_name: itodo-postgres
    environment:
      POSTGRES_DB: itodo
      POSTGRES_USER: itodo_app
      POSTGRES_PASSWORD: itodo_dev_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itodo_app -d itodo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4
    container_name: itodo-redis
    command: ["redis-server", "--requirepass", "itodo_redis_dev_password", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "itodo_redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
