openapi: 3.1.0
info:
  title: iTodo API
  version: v1
  description: Cross-platform TodoList HTTP API for mini-program, web, and mobile clients.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Lists
  - name: Todos
  - name: Steps
  - name: Tags
  - name: Reminders
  - name: Sync
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register with email or phone
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email or phone and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                clientType:
                  type: string
                deviceId:
                  type: string
      responses:
        '200':
          description: Refreshed
  /api/v1/auth/wechat-mini-program/login:
    post:
      tags: [Auth]
      summary: Login with WeChat mini-program code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                encryptedData:
                  type: string
                iv:
                  type: string
                clientType:
                  type: string
                deviceId:
                  type: string
      responses:
        '200':
          description: Logged in
  /api/v1/lists:
    get:
      tags: [Lists]
      summary: List todo lists
      responses:
        '200':
          description: Todo lists
    post:
      tags: [Lists]
      summary: Create a todo list
      responses:
        '200':
          description: Created
  /api/v1/lists/{listId}:
    get:
      tags: [Lists]
      summary: Get a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Todo list
    patch:
      tags: [Lists]
      summary: Update a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Lists]
      summary: Delete a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Deleted
  /api/v1/todos:
    get:
      tags: [Todos]
      summary: Query todos
      parameters:
        - name: listId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED]
        - name: important
          in: query
          schema:
            type: boolean
        - name: myDay
          in: query
          schema:
            type: boolean
        - name: keyword
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Todos
    post:
      tags: [Todos]
      summary: Create a todo
      responses:
        '200':
          description: Created
  /api/v1/todos/{todoId}:
    get:
      tags: [Todos]
      summary: Get a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Todo
    patch:
      tags: [Todos]
      summary: Update a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Todos]
      summary: Delete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Deleted
  /api/v1/sync/bootstrap:
    get:
      tags: [Sync]
      summary: Fetch initial sync state
      responses:
        '200':
          description: Bootstrap state
  /api/v1/sync/changes:
    get:
      tags: [Sync]
      summary: Fetch changes since a version
      parameters:
        - name: sinceVersion
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Incremental changes
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ListId:
      name: listId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TodoId:
      name: todoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    RegisterRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8
        displayName:
          type: string
    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string
        clientType:
          type: string
        deviceId:
          type: string
    AuthResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshTokenExpiresAt:
          type: string
          format: date-time
    AuthResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AuthResponse'
        error:
          $ref: '#/components/schemas/ApiError'
        traceId:
          type: string
