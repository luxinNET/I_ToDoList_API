openapi: 3.1.0
info:
  title: iTodo API
  version: v1
  description: Cross-platform TodoList HTTP API for mini-program, web, and mobile clients.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Lists
  - name: Views
  - name: Todos
  - name: Steps
  - name: Tags
  - name: Reminders
  - name: Search
  - name: Sync
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register with email or phone
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email or phone and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device
      responses:
        '200':
          description: Logged out
  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all devices
      responses:
        '200':
          description: Logged out from all devices
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated principal
      responses:
        '200':
          description: Current principal
  /api/v1/auth/wechat-mini-program/login:
    post:
      tags: [Auth]
      summary: Login with WeChat mini-program code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatMiniProgramLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/wechat-mini-program/bind-phone:
    post:
      tags: [Auth]
      summary: Bind phone number from mini-program encrypted data (future capability)
      responses:
        '501':
          description: Not implemented in current MVP
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get my profile
      responses:
        '200':
          description: Profile
    patch:
      tags: [Users]
      summary: Update my profile
      responses:
        '200':
          description: Updated profile
    delete:
      tags: [Users]
      summary: Delete my account
      responses:
        '200':
          description: Account deleted
  /api/v1/users/me/password:
    patch:
      tags: [Users]
      summary: Change my password
      responses:
        '200':
          description: Password changed
  /api/v1/lists:
    get:
      tags: [Lists]
      summary: List todo lists
      responses:
        '200':
          description: Todo lists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListListEnvelope'
    post:
      tags: [Lists]
      summary: Create a todo list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoListRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoListSuccess'
  /api/v1/lists/reorder:
    post:
      tags: [Lists]
      summary: Reorder todo lists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderItemsRequest'
      responses:
        '200':
          description: Reordered
  /api/v1/lists/{listId}:
    get:
      tags: [Lists]
      summary: Get a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          $ref: '#/components/responses/TodoListSuccess'
    patch:
      tags: [Lists]
      summary: Update a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoListRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoListSuccess'
    delete:
      tags: [Lists]
      summary: Delete a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Deleted
  /api/v1/views/my-day/todos:
    get:
      tags: [Views]
      summary: Get My Day todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/important/todos:
    get:
      tags: [Views]
      summary: Get important todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/planned/todos:
    get:
      tags: [Views]
      summary: Get planned todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/completed/todos:
    get:
      tags: [Views]
      summary: Get completed todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/all/todos:
    get:
      tags: [Views]
      summary: Get all visible todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/todos:
    get:
      tags: [Todos]
      summary: Query todos
      parameters:
        - name: listId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED]
        - name: important
          in: query
          schema:
            type: boolean
        - name: myDay
          in: query
          schema:
            type: boolean
        - name: dueFrom
          in: query
          schema:
            type: string
            format: date
        - name: dueTo
          in: query
          schema:
            type: string
            format: date
        - name: remindFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: remindTo
          in: query
          schema:
            type: string
            format: date-time
        - name: keyword
          in: query
          schema:
            type: string
        - name: tagId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
    post:
      tags: [Todos]
      summary: Create a todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/reorder:
    post:
      tags: [Todos]
      summary: Reorder todos in a list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderTodosRequest'
      responses:
        '200':
          description: Reordered
  /api/v1/todos/{todoId}:
    get:
      tags: [Todos]
      summary: Get a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    patch:
      tags: [Todos]
      summary: Update a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    delete:
      tags: [Todos]
      summary: Delete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Deleted
  /api/v1/todos/{todoId}/complete:
    post:
      tags: [Todos]
      summary: Complete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/{todoId}/uncomplete:
    post:
      tags: [Todos]
      summary: Restore a completed todo to active
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/{todoId}/important:
    post:
      tags: [Todos]
      summary: Mark a todo as important
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    delete:
      tags: [Todos]
      summary: Remove important mark
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/{todoId}/my-day:
    post:
      tags: [Todos]
      summary: Add a todo to My Day
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    delete:
      tags: [Todos]
      summary: Remove a todo from My Day
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/{todoId}/steps:
    get:
      tags: [Steps]
      summary: List todo steps
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoStepListEnvelope'
    post:
      tags: [Steps]
      summary: Create a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoStepRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoStepSuccess'
  /api/v1/todos/{todoId}/steps/reorder:
    post:
      tags: [Steps]
      summary: Reorder todo steps
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderItemsRequest'
      responses:
        '200':
          description: Reordered
  /api/v1/todos/{todoId}/steps/{stepId}:
    patch:
      tags: [Steps]
      summary: Update a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/StepId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoStepRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoStepSuccess'
    delete:
      tags: [Steps]
      summary: Delete a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/StepId'
      responses:
        '200':
          description: Deleted
  /api/v1/tags:
    get:
      tags: [Tags]
      summary: List tags
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListEnvelope'
    post:
      tags: [Tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '200':
          $ref: '#/components/responses/TagSuccess'
  /api/v1/tags/{tagId}:
    patch:
      tags: [Tags]
      summary: Update a tag
      parameters:
        - $ref: '#/components/parameters/TagId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTagRequest'
      responses:
        '200':
          $ref: '#/components/responses/TagSuccess'
    delete:
      tags: [Tags]
      summary: Delete a tag
      parameters:
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Deleted
  /api/v1/todos/{todoId}/tags/{tagId}:
    post:
      tags: [Tags]
      summary: Bind tag to todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Bound
    delete:
      tags: [Tags]
      summary: Unbind tag from todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Unbound
  /api/v1/reminders:
    get:
      tags: [Reminders]
      summary: List reminders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, SENT, CANCELLED]
        - name: remindFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: remindTo
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/ReminderPageSuccess'
  /api/v1/todos/{todoId}/reminders:
    post:
      tags: [Reminders]
      summary: Create a reminder for a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReminderSuccess'
  /api/v1/todos/{todoId}/reminders/{reminderId}:
    patch:
      tags: [Reminders]
      summary: Update a reminder
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/ReminderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReminderRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReminderSuccess'
    delete:
      tags: [Reminders]
      summary: Delete a reminder
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '200':
          description: Deleted
  /api/v1/search/todos:
    get:
      tags: [Search]
      summary: Search todos by keyword
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/sync/bootstrap:
    get:
      tags: [Sync]
      summary: Fetch initial sync state
      responses:
        '200':
          description: Sync bootstrap snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncBootstrapEnvelope'
  /api/v1/sync/changes:
    get:
      tags: [Sync]
      summary: Fetch sync changes after a version
      parameters:
        - name: sinceVersion
          in: query
          schema:
            type: integer
            format: int64
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Sync changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncChangesEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ListId:
      name: listId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TodoId:
      name: todoId
      in: path
      required: true
      schema: { type: string, format: uuid }
    StepId:
      name: stepId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TagId:
      name: tagId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReminderId:
      name: reminderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Size:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  responses:
    AuthSuccess:
      description: Auth operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthResponseEnvelope'
    TodoListSuccess:
      description: Todo list operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoListResponseEnvelope'
    TodoSuccess:
      description: Todo operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoResponseEnvelope'
    TodoPageSuccess:
      description: Todo page query succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoPageResponseEnvelope'
    TodoStepSuccess:
      description: Todo step operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoStepResponseEnvelope'
    TagSuccess:
      description: Tag operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TagResponseEnvelope'
    ReminderSuccess:
      description: Reminder operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReminderResponseEnvelope'
    ReminderPageSuccess:
      description: Reminder page query succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReminderPageResponseEnvelope'
  schemas:
    ApiError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
    RegisterRequest:
      type: object
      required: [password]
      properties:
        email: { type: string, format: email }
        phone: { type: string }
        password: { type: string, minLength: 8 }
        displayName: { type: string }
    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account: { type: string }
        password: { type: string }
        clientType: { type: string }
        deviceId: { type: string }
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
        clientType: { type: string }
        deviceId: { type: string }
    WechatMiniProgramLoginRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }
        encryptedData: { type: string }
        iv: { type: string }
        clientType: { type: string }
        deviceId: { type: string }
    AuthResponse:
      type: object
      properties:
        userId: { type: string, format: uuid }
        accessToken: { type: string }
        refreshToken: { type: string }
        accessTokenExpiresAt: { type: string, format: date-time }
        refreshTokenExpiresAt: { type: string, format: date-time }
    TodoListResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }
        icon: { type: string }
        sortOrder: { type: integer }
        isSystem: { type: boolean }
        isShared: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateTodoListRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 128 }
        color: { type: string, maxLength: 32 }
        icon: { type: string, maxLength: 64 }
    UpdateTodoListRequest:
      type: object
      properties:
        name: { type: string, maxLength: 128 }
        color: { type: string, maxLength: 32 }
        icon: { type: string, maxLength: 64 }
    ReorderItemRequest:
      type: object
      required: [id, sortOrder]
      properties:
        id: { type: string, format: uuid }
        sortOrder: { type: integer }
    ReorderItemsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ReorderItemRequest' }
    ReorderTodosRequest:
      type: object
      required: [listId, items]
      properties:
        listId: { type: string, format: uuid }
        items:
          type: array
          items: { $ref: '#/components/schemas/ReorderItemRequest' }
    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        listId: { type: string, format: uuid }
        title: { type: string, maxLength: 255 }
        note: { type: string }
        dueDate: { type: string, format: date }
        remindAt: { type: string, format: date-time }
        repeatRule: { type: string, maxLength: 255 }
        myDay: { type: boolean }
        important: { type: boolean }
        sortOrder: { type: integer }
    UpdateTodoRequest:
      type: object
      properties:
        listId: { type: string, format: uuid }
        title: { type: string, maxLength: 255 }
        note: { type: string }
        dueDate: { type: string, format: date }
        remindAt: { type: string, format: date-time }
        repeatRule: { type: string, maxLength: 255 }
        myDay: { type: boolean }
        important: { type: boolean }
        sortOrder: { type: integer }
        clearNote: { type: boolean }
        clearDueDate: { type: boolean }
        clearRemindAt: { type: boolean }
        clearRepeatRule: { type: boolean }
    TodoResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        listId: { type: string, format: uuid }
        title: { type: string }
        note: { type: string }
        status: { type: string, enum: [ACTIVE, COMPLETED] }
        importance: { type: string, enum: [NORMAL, IMPORTANT] }
        dueDate: { type: string, format: date }
        remindAt: { type: string, format: date-time }
        repeatRule: { type: string }
        completedAt: { type: string, format: date-time }
        sortOrder: { type: integer }
        myDay: { type: boolean }
        version: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateTodoStepRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 255 }
        isCompleted: { type: boolean }
        sortOrder: { type: integer }
    UpdateTodoStepRequest:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        isCompleted: { type: boolean }
        sortOrder: { type: integer }
    TodoStepResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        todoId: { type: string, format: uuid }
        title: { type: string }
        isCompleted: { type: boolean }
