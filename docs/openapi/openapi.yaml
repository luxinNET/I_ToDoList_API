openapi: 3.1.0
info:
  title: iTodo API
  version: v1
  description: Cross-platform TodoList HTTP API with AI features for mini-program, web, and mobile clients.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Lists
  - name: Views
  - name: Todos
  - name: Steps
  - name: Tags
  - name: Reminders
  - name: Search
  - name: Sync
  - name: Calendar
    description: Calendar view for tasks
  - name: AI Todo
    description: AI-powered natural language task creation and decomposition
  - name: AI Report
    description: AI-generated daily/weekly reports
  - name: AI Suggestion
    description: AI-powered personalized task suggestions
  - name: Goals
    description: Long-term goal planning and tracking
paths:
  # ==================== Auth ====================
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register with email or phone
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email or phone and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device
      responses:
        '200':
          description: Logged out
  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all devices
      responses:
        '200':
          description: Logged out from all devices
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated principal
      responses:
        '200':
          description: Current principal
  /api/v1/auth/wechat-mini-program/login:
    post:
      tags: [Auth]
      summary: Login with WeChat mini-program code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatMiniProgramLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/wechat-mini-program/bind-phone:
    post:
      tags: [Auth]
      summary: Bind phone number from mini-program encrypted data (future capability)
      responses:
        '501':
          description: Not implemented in current MVP

  # ==================== Users ====================
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get my profile
      responses:
        '200':
          description: Profile
    patch:
      tags: [Users]
      summary: Update my profile
      responses:
        '200':
          description: Updated profile
    delete:
      tags: [Users]
      summary: Delete my account
      responses:
        '200':
          description: Account deleted
  /api/v1/users/me/password:
    patch:
      tags: [Users]
      summary: Change my password
      responses:
        '200':
          description: Password changed

  # ==================== Lists ====================
  /api/v1/lists:
    get:
      tags: [Lists]
      summary: List todo lists
      responses:
        '200':
          description: Todo lists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListListEnvelope'
    post:
      tags: [Lists]
      summary: Create a todo list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoListRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoListSuccess'
  /api/v1/lists/reorder:
    post:
      tags: [Lists]
      summary: Reorder todo lists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderItemsRequest'
      responses:
        '200':
          description: Reordered
  /api/v1/lists/{listId}:
    get:
      tags: [Lists]
      summary: Get a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          $ref: '#/components/responses/TodoListSuccess'
    patch:
      tags: [Lists]
      summary: Update a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoListRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoListSuccess'
    delete:
      tags: [Lists]
      summary: Delete a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Deleted

  # ==================== Views ====================
  /api/v1/views/my-day/todos:
    get:
      tags: [Views]
      summary: Get My Day todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/important/todos:
    get:
      tags: [Views]
      summary: Get important todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/planned/todos:
    get:
      tags: [Views]
      summary: Get planned todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/completed/todos:
    get:
      tags: [Views]
      summary: Get completed todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
  /api/v1/views/all/todos:
    get:
      tags: [Views]
      summary: Get all visible todos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'

  # ==================== Todos ====================
  /api/v1/todos:
    get:
      tags: [Todos]
      summary: Query todos
      parameters:
        - name: listId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED]
        - name: important
          in: query
          schema:
            type: boolean
        - name: myDay
          in: query
          schema:
            type: boolean
        - name: dueFrom
          in: query
          schema:
            type: string
            format: date
        - name: dueTo
          in: query
          schema:
            type: string
            format: date
        - name: remindFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: remindTo
          in: query
          schema:
            type: string
            format: date-time
        - name: keyword
          in: query
          schema:
            type: string
        - name: tagId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
    post:
      tags: [Todos]
      summary: Create a todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/reorder:
    post:
      tags: [Todos]
      summary: Reorder todos in a list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderTodosRequest'
      responses:
        '200':
          description: Reordered
  /api/v1/todos/{todoId}:
    get:
      tags: [Todos]
      summary: Get a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    patch:
      tags: [Todos]
      summary: Update a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    delete:
      tags: [Todos]
      summary: Delete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Deleted
  /api/v1/todos/{todoId}/complete:
    post:
      tags: [Todos]
      summary: Complete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/{todoId}/uncomplete:
    post:
      tags: [Todos]
      summary: Restore a completed todo to active
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/{todoId}/important:
    post:
      tags: [Todos]
      summary: Mark a todo as important
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    delete:
      tags: [Todos]
      summary: Remove important mark
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
  /api/v1/todos/{todoId}/my-day:
    post:
      tags: [Todos]
      summary: Add a todo to My Day
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'
    delete:
      tags: [Todos]
      summary: Remove a todo from My Day
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'

  # ==================== Steps ====================
  /api/v1/todos/{todoId}/steps:
    get:
      tags: [Steps]
      summary: List todo steps
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoStepListEnvelope'
    post:
      tags: [Steps]
      summary: Create a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoStepRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoStepSuccess'
  /api/v1/todos/{todoId}/steps/reorder:
    post:
      tags: [Steps]
      summary: Reorder todo steps
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderItemsRequest'
      responses:
        '200':
          description: Reordered
  /api/v1/todos/{todoId}/steps/{stepId}:
    patch:
      tags: [Steps]
      summary: Update a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/StepId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoStepRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoStepSuccess'
    delete:
      tags: [Steps]
      summary: Delete a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/StepId'
      responses:
        '200':
          description: Deleted

  # ==================== Tags ====================
  /api/v1/tags:
    get:
      tags: [Tags]
      summary: List tags
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListEnvelope'
    post:
      tags: [Tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '200':
          $ref: '#/components/responses/TagSuccess'
  /api/v1/tags/{tagId}:
    patch:
      tags: [Tags]
      summary: Update a tag
      parameters:
        - $ref: '#/components/parameters/TagId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTagRequest'
      responses:
        '200':
          $ref: '#/components/responses/TagSuccess'
    delete:
      tags: [Tags]
      summary: Delete a tag
      parameters:
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Deleted
  /api/v1/todos/{todoId}/tags/{tagId}:
    post:
      tags: [Tags]
      summary: Bind tag to todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Bound
    delete:
      tags: [Tags]
      summary: Unbind tag from todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Unbound

  # ==================== Reminders ====================
  /api/v1/reminders:
    get:
      tags: [Reminders]
      summary: List reminders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, SENT, CANCELLED]
        - name: remindFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: remindTo
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/ReminderPageSuccess'
  /api/v1/todos/{todoId}/reminders:
    post:
      tags: [Reminders]
      summary: Create a reminder for a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReminderSuccess'
  /api/v1/todos/{todoId}/reminders/{reminderId}:
    patch:
      tags: [Reminders]
      summary: Update a reminder
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/ReminderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReminderRequest'
      responses:
        '200':
          $ref: '#/components/responses/ReminderSuccess'
    delete:
      tags: [Reminders]
      summary: Delete a reminder
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '200':
          description: Deleted

  # ==================== Search ====================
  /api/v1/search/todos:
    get:
      tags: [Search]
      summary: Search todos by keyword
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'

  # ==================== Sync ====================
  /api/v1/sync/bootstrap:
    get:
      tags: [Sync]
      summary: Fetch initial sync state
      responses:
        '200':
          description: Sync bootstrap snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncBootstrapEnvelope'
  /api/v1/sync/changes:
    get:
      tags: [Sync]
      summary: Fetch sync changes after a version
      parameters:
        - name: sinceVersion
          in: query
          schema:
            type: integer
            format: int64
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Sync changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncChangesEnvelope'

  # ==================== Calendar (P0) ====================
  /api/v1/calendar:
    get:
      tags: [Calendar]
      summary: Get calendar overview (task statistics by date range)
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Start date (inclusive)
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
          description: End date (inclusive)
      responses:
        '200':
          description: Calendar day statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarDayStatsListEnvelope'
  /api/v1/calendar/{date}/todos:
    get:
      tags: [Calendar]
      summary: Get todos for a specific date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
          description: The date to query (YYYY-MM-DD)
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'

  # ==================== AI Todo - Natural Language Parse (P0) ====================
  /api/v1/ai/todos/parse:
    post:
      tags: [AI Todo]
      summary: Parse natural language input into structured todo (preview)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiTodoParseRequest'
      responses:
        '200':
          description: Parsed todo preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiTodoParseResponseEnvelope'
  /api/v1/ai/todos:
    post:
      tags: [AI Todo]
      summary: Confirm and create AI-parsed todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiTodoConfirmRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoSuccess'

  # ==================== AI Todo - Task Decomposition (P1) ====================
  /api/v1/ai/todos/{todoId}/decompose:
    post:
      tags: [AI Todo]
      summary: AI decomposes a task into subtasks (preview)
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiDecomposeRequest'
      responses:
        '200':
          description: Decomposition preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiDecomposeResponseEnvelope'
  /api/v1/ai/todos/{todoId}/decompose/confirm:
    post:
      tags: [AI Todo]
      summary: Confirm and create AI-decomposed subtasks
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiDecomposeConfirmRequest'
      responses:
        '200':
          description: Subtasks created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoStepListEnvelope'

  # ==================== AI Report - Daily/Weekly Reports (P1) ====================
  /api/v1/ai/reports/daily:
    get:
      tags: [AI Report]
      summary: Get or generate daily report
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "Date for report (default: today)"
      responses:
        '200':
          description: Daily report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiReportResponseEnvelope'
    post:
      tags: [AI Report]
      summary: Generate daily report
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "Date for report (default: today)"
      responses:
        '200':
          description: Daily report generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiReportResponseEnvelope'
  /api/v1/ai/reports/weekly:
    get:
      tags: [AI Report]
      summary: Get or generate weekly report
      parameters:
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
          description: "Week start date (default: this Monday)"
      responses:
        '200':
          description: Weekly report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiReportResponseEnvelope'
    post:
      tags: [AI Report]
      summary: Generate weekly report
      parameters:
        - name: weekStart
          in: query
          schema:
            type: string
            format: date
          description: "Week start date (default: this Monday)"
      responses:
        '200':
          description: Weekly report generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiReportResponseEnvelope'

  # ==================== AI Suggestion - Personalized Task Suggestions (P2) ====================
  /api/v1/ai/suggestions/next:
    get:
      tags: [AI Suggestion]
      summary: Get AI suggestion for next task to work on
      responses:
        '200':
          description: Next task suggestion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiSuggestionResponseEnvelope'

  # ==================== Goals - Long-term Planning (P2) ====================
  /api/v1/goals:
    get:
      tags: [Goals]
      summary: List goals
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, ARCHIVED]
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Goals list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalPageResponseEnvelope'
    post:
      tags: [Goals]
      summary: Create a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGoalRequest'
      responses:
        '200':
          $ref: '#/components/responses/GoalSuccess'
  /api/v1/goals/{goalId}:
    get:
      tags: [Goals]
      summary: Get a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      responses:
        '200':
          $ref: '#/components/responses/GoalSuccess'
    patch:
      tags: [Goals]
      summary: Update a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalRequest'
      responses:
        '200':
          $ref: '#/components/responses/GoalSuccess'
    delete:
      tags: [Goals]
      summary: Delete a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      responses:
        '200':
          description: Deleted
  /api/v1/goals/{goalId}/todos:
    get:
      tags: [Goals]
      summary: Get todos linked to a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'
    post:
      tags: [Goals]
      summary: Link a todo to a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkTodoToGoalRequest'
      responses:
        '200':
          description: Linked
  /api/v1/goals/{goalId}/todos/{todoId}:
    delete:
      tags: [Goals]
      summary: Unlink a todo from a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Unlinked
  /api/v1/goals/{goalId}/generate-tasks:
    post:
      tags: [Goals]
      summary: AI generates tasks for a goal (preview)
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateTasksRequest'
      responses:
        '200':
          description: Generated tasks preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateTasksResponseEnvelope'
  /api/v1/goals/{goalId}/generate-tasks/confirm:
    post:
      tags: [Goals]
      summary: Confirm and create AI-generated tasks for a goal
      parameters:
        - $ref: '#/components/parameters/GoalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateTasksConfirmRequest'
      responses:
        '200':
          $ref: '#/components/responses/TodoPageSuccess'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ListId:
      name: listId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TodoId:
      name: todoId
      in: path
      required: true
      schema: { type: string, format: uuid }
    StepId:
      name: stepId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TagId:
      name: tagId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReminderId:
      name: reminderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GoalId:
      name: goalId
      in: path
      required: true
      schema: { type: string, format: uuid }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Size:
      name: size
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  responses:
    AuthSuccess:
      description: Auth operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthResponseEnvelope'
    TodoListSuccess:
      description: Todo list operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoListResponseEnvelope'
    TodoSuccess:
      description: Todo operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoResponseEnvelope'
    TodoPageSuccess:
      description: Todo page query succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoPageResponseEnvelope'
    TodoStepSuccess:
      description: Todo step operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TodoStepResponseEnvelope'
    TagSuccess:
      description: Tag operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TagResponseEnvelope'
    ReminderSuccess:
      description: Reminder operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReminderResponseEnvelope'
    ReminderPageSuccess:
      description: Reminder page query succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReminderPageResponseEnvelope'
    GoalSuccess:
      description: Goal operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GoalResponseEnvelope'
    AiReportSuccess:
      description: AI report operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AiReportResponseEnvelope'
  schemas:
    # ==================== Base Types ====================
    ApiError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    # ==================== Auth ====================
    RegisterRequest:
      type: object
      required: [password]
      properties:
        email: { type: string, format: email }
        phone: { type: string }
        password: { type: string, minLength: 8 }
        displayName: { type: string }
    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account: { type: string }
        password: { type: string }
        clientType: { type: string }
        deviceId: { type: string }
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
        clientType: { type: string }
        deviceId: { type: string }
    WechatMiniProgramLoginRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }
        encryptedData: { type: string }
        iv: { type: string }
        clientType: { type: string }
        deviceId: { type: string }
    AuthResponse:
      type: object
      properties:
        userId: { type: string, format: uuid }
        accessToken: { type: string }
        refreshToken: { type: string }
        accessTokenExpiresAt: { type: string, format: date-time }
        refreshTokenExpiresAt: { type: string, format: date-time }

    # ==================== Todo Lists ====================
    TodoListResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }
        icon: { type: string }
        sortOrder: { type: integer }
        isSystem: { type: boolean }
        isShared: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateTodoListRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 128 }
        color: { type: string, maxLength: 32 }
        icon: { type: string, maxLength: 64 }
    UpdateTodoListRequest:
      type: object
      properties:
        name: { type: string, maxLength: 128 }
        color: { type: string, maxLength: 32 }
        icon: { type: string, maxLength: 64 }

    # ==================== Reorder ====================
    ReorderItemRequest:
      type: object
      required: [id, sortOrder]
      properties:
        id: { type: string, format: uuid }
        sortOrder: { type: integer }
    ReorderItemsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ReorderItemRequest' }
    ReorderTodosRequest:
      type: object
      required: [listId, items]
      properties:
        listId: { type: string, format: uuid }
        items:
          type: array
          items: { $ref: '#/components/schemas/ReorderItemRequest' }

    # ==================== Todos ====================
    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        listId: { type: string, format: uuid }
        title: { type: string, maxLength: 255 }
        note: { type: string }
        dueDate: { type: string, format: date }
        remindAt: { type: string, format: date-time }
        repeatRule: { type: string, maxLength: 255 }
        myDay: { type: boolean }
        important: { type: boolean }
        sortOrder: { type: integer }
    UpdateTodoRequest:
      type: object
      properties:
        listId: { type: string, format: uuid }
        title: { type: string, maxLength: 255 }
        note: { type: string }
        dueDate: { type: string, format: date }
        remindAt: { type: string, format: date-time }
        repeatRule: { type: string, maxLength: 255 }
        myDay: { type: boolean }
        important: { type: boolean }
        sortOrder: { type: integer }
        clearNote: { type: boolean }
        clearDueDate: { type: boolean }
        clearRemindAt: { type: boolean }
        clearRepeatRule: { type: boolean }
    TodoResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        listId: { type: string, format: uuid }
        title: { type: string }
        note: { type: string }
        status: { type: string, enum: [ACTIVE, COMPLETED] }
        importance: { type: string, enum: [NORMAL, IMPORTANT] }
        dueDate: { type: string, format: date }
        remindAt: { type: string, format: date-time }
        repeatRule: { type: string }
        completedAt: { type: string, format: date-time }
        sortOrder: { type: integer }
        myDay: { type: boolean }
        version: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ==================== Steps ====================
    CreateTodoStepRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 255 }
        isCompleted: { type: boolean }
        sortOrder: { type: integer }
    UpdateTodoStepRequest:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        isCompleted: { type: boolean }
        sortOrder: { type: integer }
    TodoStepResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        todoId: { type: string, format: uuid }
        title: { type: string }
        isCompleted: { type: boolean }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ==================== Tags ====================
    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 64 }
        color: { type: string, maxLength: 32 }
    UpdateTagRequest:
      type: object
      properties:
        name: { type: string, maxLength: 64 }
        color: { type: string, maxLength: 32 }
    TagResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ==================== Reminders ====================
    CreateReminderRequest:
      type: object
      required: [remindAt]
      properties:
        remindAt: { type: string, format: date-time }
        channel: { type: string, enum: [IN_APP] }
    UpdateReminderRequest:
      type: object
      properties:
        remindAt: { type: string, format: date-time }
        channel: { type: string, enum: [IN_APP] }
        status: { type: string, enum: [PENDING, SENT, CANCELLED] }
    ReminderResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        todoId: { type: string, format: uuid }
        remindAt: { type: string, format: date-time }
        channel: { type: string }
        status: { type: string, enum: [PENDING, SENT, CANCELLED] }
        sentAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ==================== Sync ====================
    TodoTagLinkResponse:
      type: object
      properties:
        todoId: { type: string, format: uuid }
        tagId: { type: string, format: uuid }
    SyncChangeResponse:
      type: object
      properties:
        version: { type: integer, format: int64 }
        resourceType: { type: string, enum: [LIST, TODO, STEP, TAG, TODO_TAG, REMINDER, GOAL] }
        resourceId: { type: string, format: uuid }
        operation: { type: string, enum: [CREATE, UPDATE, DELETE] }
        changedAt: { type: string, format: date-time }
    SyncChangesResponse:
      type: object
      properties:
        sinceVersion: { type: integer, format: int64 }
        currentVersion: { type: integer, format: int64 }
        changes:
          type: array
          items: { $ref: '#/components/schemas/SyncChangeResponse' }
    SyncBootstrapResponse:
      type: object
      properties:
        currentVersion: { type: integer, format: int64 }
        lists:
          type: array
          items: { $ref: '#/components/schemas/TodoListResponse' }
        todos:
          type: array
          items: { $ref: '#/components/schemas/TodoResponse' }
        steps:
          type: array
          items: { $ref: '#/components/schemas/TodoStepResponse' }
        tags:
          type: array
          items: { $ref: '#/components/schemas/TagResponse' }
        todoTags:
          type: array
          items: { $ref: '#/components/schemas/TodoTagLinkResponse' }
        reminders:
          type: array
          items: { $ref: '#/components/schemas/ReminderResponse' }

    # ==================== Calendar (P0) ====================
    CalendarDayStats:
      type: object
      properties:
        date: { type: string, format: date }
        total: { type: integer, format: int64 }
        completed: { type: integer, format: int64 }
        active: { type: integer, format: int64 }
        overdue: { type: integer, format: int64 }
    CalendarDayStatsListEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/CalendarDayStats' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }

    # ==================== AI Todo Parse (P0) ====================
    AiTodoParseRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: "Natural language input, e.g. '下周三下午提醒我准备季度报告'"
          example: "下周三下午提醒我准备季度报告"
        timezone:
          type: string
          default: "Asia/Shanghai"
          description: "User timezone"
    ParsedTodo:
      type: object
      properties:
        title: { type: string, description: "Parsed task title" }
        note: { type: string, description: "Parsed note" }
        dueDate:
          type: string
          format: date
          description: "Parsed due date (YYYY-MM-DD)"
        remindAt:
          type: string
          format: date-time
          description: "Parsed reminder time"
        importance:
          type: string
          enum: [NORMAL, IMPORTANT]
          description: "Parsed importance"
        tags:
          type: array
          items: { type: string }
          description: "Parsed tags"
        listName:
          type: string
          description: "Suggested list name"
    AiTodoParseResponse:
      type: object
      properties:
        previewId:
          type: string
          description: "Preview ID for confirmation"
        parsedTodo: { $ref: '#/components/schemas/ParsedTodo' }
        suggestion:
          type: string
          description: "AI suggestion text"
    AiTodoConfirmRequest:
      type: object
      required: [previewId, parsedTodo]
      properties:
        previewId: { type: string }
        parsedTodo: { $ref: '#/components/schemas/ParsedTodo' }
    AiTodoParseResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/AiTodoParseResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }

    # ==================== AI Task Decomposition (P1) ====================
    AiDecomposeRequest:
      type: object
      properties:
        hint:
          type: string
          description: "Optional hint for decomposition"
    AiDecomposedStep:
      type: object
      properties:
        title: { type: string }
        sortOrder: { type: integer }
    AiDecomposeResponse:
      type: object
      properties:
        previewId: { type: string }
        steps:
          type: array
          items: { $ref: '#/components/schemas/AiDecomposedStep' }
        suggestion: { type: string }
    AiDecomposeConfirmRequest:
      type: object
      required: [previewId, steps]
      properties:
        previewId: { type: string }
        steps:
          type: array
          items: { $ref: '#/components/schemas/AiDecomposedStep' }
    AiDecomposeResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/AiDecomposeResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }

    # ==================== AI Report (P1) ====================
    AiReportResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        reportType: { type: string, enum: [DAILY, WEEKLY] }
        reportDate: { type: string, format: date }
        content: { type: string, description: "AI-generated report content (Markdown)" }
        stats:
          type: object
          description: "Task statistics used for report generation"
          properties:
            totalCompleted: { type: integer }
            totalCreated: { type: integer }
            completionRate: { type: number, format: double }
            topTags:
              type: array
              items: { type: string }
        createdAt: { type: string, format: date-time }
    AiReportResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/AiReportResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }

    # ==================== AI Suggestion (P2) ====================
    AiSuggestionResponse:
      type: object
      properties:
        suggestedTodoId:
          type: string
          format: uuid
          description: "Recommended todo to work on next"
        reason:
          type: string
          description: "AI explanation for the suggestion"
        alternatives:
          type: array
          items:
            type: object
            properties:
              todoId: { type: string, format: uuid }
              score: { type: number, format: double }
              reason: { type: string }
    AiSuggestionResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/AiSuggestionResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }

    # ==================== Goals (P2) ====================
    GoalResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [ACTIVE, COMPLETED, ARCHIVED] }
        targetDate: { type: string, format: date }
        progress:
          type: number
          format: double
          description: "Progress percentage (0.0 - 1.0)"
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateGoalRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string }
        targetDate: { type: string, format: date }
    UpdateGoalRequest:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string }
        status: { type: string, enum: [ACTIVE, COMPLETED, ARCHIVED] }
        targetDate: { type: string, format: date }
        progress: { type: number, format: double }
    LinkTodoToGoalRequest:
      type: object
      required: [todoId]
      properties:
        todoId: { type: string, format: uuid }
    GenerateTasksRequest:
      type: object
      properties:
        hint:
          type: string
          description: "Optional hint for task generation"
    GenerateTasksResponse:
      type: object
      properties:
        previewId: { type: string }
        tasks:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              dueDate: { type: string, format: date }
              importance: { type: string, enum: [NORMAL, IMPORTANT] }
        suggestion: { type: string }
    GenerateTasksResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/GenerateTasksResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    GenerateTasksConfirmRequest:
      type: object
      required: [previewId, tasks]
      properties:
        previewId: { type: string }
        tasks:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              dueDate: { type: string, format: date }
              importance: { type: string, enum: [NORMAL, IMPORTANT] }

    # ==================== Response Envelopes ====================
    AuthResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/AuthResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TodoListResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/TodoListResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TodoListListEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/TodoListResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TodoResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/TodoResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TodoPageResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/TodoResponse' }
            total: { type: integer, format: int64 }
            page: { type: integer, format: int64 }
            size: { type: integer, format: int64 }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TodoStepResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/TodoStepResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TodoStepListEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/TodoStepResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TagResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/TagResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    TagListEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/TagResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    ReminderResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/ReminderResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    ReminderPageResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/ReminderResponse' }
            total: { type: integer, format: int64 }
            page: { type: integer, format: int64 }
            size: { type: integer, format: int64 }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    GoalResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/GoalResponse' }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    GoalPageResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/GoalResponse' }
            total: { type: integer, format: int64 }
            page: { type: integer, format: int64 }
            size: { type: integer, format: int64 }
        error: { $ref: '#/components/schemas/ApiError' }
        traceId: { type: string }
    SyncBootstrapEnvelope:
      type: object
