openapi: 3.1.0
info:
  title: iTodo API
  version: v1
  description: Cross-platform TodoList HTTP API for mini-program, web, and mobile clients.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Lists
  - name: Views
  - name: Todos
  - name: Steps
  - name: Tags
  - name: Reminders
  - name: Search
  - name: Sync
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register with email or phone
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email or phone and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device
      responses:
        '200':
          description: Logged out
  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all devices
      responses:
        '200':
          description: Logged out from all devices
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated principal
      responses:
        '200':
          description: Current principal
  /api/v1/auth/wechat-mini-program/login:
    post:
      tags: [Auth]
      summary: Login with WeChat mini-program code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatMiniProgramLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSuccess'
  /api/v1/auth/wechat-mini-program/bind-phone:
    post:
      tags: [Auth]
      summary: Bind phone number from mini-program encrypted data
      responses:
        '200':
          description: Phone bound
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get my profile
      responses:
        '200':
          description: Profile
    patch:
      tags: [Users]
      summary: Update my profile
      responses:
        '200':
          description: Updated profile
    delete:
      tags: [Users]
      summary: Delete my account
      responses:
        '200':
          description: Account deleted
  /api/v1/users/me/password:
    patch:
      tags: [Users]
      summary: Change my password
      responses:
        '200':
          description: Password changed
  /api/v1/lists:
    get:
      tags: [Lists]
      summary: List todo lists
      responses:
        '200':
          description: Todo lists
    post:
      tags: [Lists]
      summary: Create a todo list
      responses:
        '200':
          description: Created
  /api/v1/lists/reorder:
    post:
      tags: [Lists]
      summary: Reorder todo lists
      responses:
        '200':
          description: Reordered
  /api/v1/lists/{listId}:
    get:
      tags: [Lists]
      summary: Get a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Todo list
    patch:
      tags: [Lists]
      summary: Update a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Lists]
      summary: Delete a todo list
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Deleted
  /api/v1/views/my-day/todos:
    get:
      tags: [Views]
      summary: Get My Day todos
      responses:
        '200':
          description: Todos
  /api/v1/views/important/todos:
    get:
      tags: [Views]
      summary: Get important todos
      responses:
        '200':
          description: Todos
  /api/v1/views/planned/todos:
    get:
      tags: [Views]
      summary: Get planned todos
      responses:
        '200':
          description: Todos
  /api/v1/views/completed/todos:
    get:
      tags: [Views]
      summary: Get completed todos
      responses:
        '200':
          description: Todos
  /api/v1/views/all/todos:
    get:
      tags: [Views]
      summary: Get all visible todos
      responses:
        '200':
          description: Todos
  /api/v1/todos:
    get:
      tags: [Todos]
      summary: Query todos
      parameters:
        - name: listId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED]
        - name: important
          in: query
          schema:
            type: boolean
        - name: myDay
          in: query
          schema:
            type: boolean
        - name: dueFrom
          in: query
          schema:
            type: string
            format: date
        - name: dueTo
          in: query
          schema:
            type: string
            format: date
        - name: remindFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: remindTo
          in: query
          schema:
            type: string
            format: date-time
        - name: tagId
          in: query
          schema:
            type: string
            format: uuid
        - name: keyword
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Todos
    post:
      tags: [Todos]
      summary: Create a todo
      responses:
        '200':
          description: Created
  /api/v1/todos/reorder:
    post:
      tags: [Todos]
      summary: Reorder todos in a list
      responses:
        '200':
          description: Reordered
  /api/v1/todos/{todoId}:
    get:
      tags: [Todos]
      summary: Get a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Todo
    patch:
      tags: [Todos]
      summary: Update a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Todos]
      summary: Delete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Deleted
  /api/v1/todos/{todoId}/complete:
    post:
      tags: [Todos]
      summary: Complete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Completed
  /api/v1/todos/{todoId}/uncomplete:
    post:
      tags: [Todos]
      summary: Restore a completed todo to active
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Restored
  /api/v1/todos/{todoId}/important:
    post:
      tags: [Todos]
      summary: Mark a todo as important
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Marked important
    delete:
      tags: [Todos]
      summary: Remove important mark
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Removed important mark
  /api/v1/todos/{todoId}/my-day:
    post:
      tags: [Todos]
      summary: Add a todo to My Day
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Added
    delete:
      tags: [Todos]
      summary: Remove a todo from My Day
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Removed
  /api/v1/todos/{todoId}/steps:
    get:
      tags: [Steps]
      summary: List todo steps
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Steps
    post:
      tags: [Steps]
      summary: Create a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Created
  /api/v1/todos/{todoId}/steps/reorder:
    post:
      tags: [Steps]
      summary: Reorder todo steps
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Reordered
  /api/v1/todos/{todoId}/steps/{stepId}:
    patch:
      tags: [Steps]
      summary: Update a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/StepId'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Steps]
      summary: Delete a todo step
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/StepId'
      responses:
        '200':
          description: Deleted
  /api/v1/tags:
    get:
      tags: [Tags]
      summary: List tags
      responses:
        '200':
          description: Tags
    post:
      tags: [Tags]
      summary: Create a tag
      responses:
        '200':
          description: Created
  /api/v1/tags/{tagId}:
    patch:
      tags: [Tags]
      summary: Update a tag
      parameters:
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Tags]
      summary: Delete a tag
      parameters:
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Deleted
  /api/v1/todos/{todoId}/tags/{tagId}:
    post:
      tags: [Tags]
      summary: Bind tag to todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Bound
    delete:
      tags: [Tags]
      summary: Unbind tag from todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/TagId'
      responses:
        '200':
          description: Unbound
  /api/v1/reminders:
    get:
      tags: [Reminders]
      summary: List reminders
      responses:
        '200':
          description: Reminders
  /api/v1/todos/{todoId}/reminders:
    post:
      tags: [Reminders]
      summary: Create a reminder for a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Created
  /api/v1/todos/{todoId}/reminders/{reminderId}:
    patch:
      tags: [Reminders]
      summary: Update a reminder
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '200':
          description: Updated
    delete:
      tags: [Reminders]
      summary: Delete a reminder
      parameters:
        - $ref: '#/components/parameters/TodoId'
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '200':
          description: Deleted
  /api/v1/search/todos:
    get:
      tags: [Search]
      summary: Search todos by keyword
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Search results
  /api/v1/sync/bootstrap:
    get:
      tags: [Sync]
      summary: Fetch initial sync state
      responses:
        '200':
          description: Bootstrap state
  /api/v1/sync/changes:
    get:
      tags: [Sync]
      summary: Fetch changes since a version
      parameters:
        - name: sinceVersion
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Incremental changes
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ListId:
      name: listId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TodoId:
      name: todoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StepId:
      name: stepId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReminderId:
      name: reminderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    AuthSuccess:
      description: Auth operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthResponseEnvelope'
  schemas:
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    RegisterRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8
        displayName:
          type: string
    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string
        clientType:
          type: string
        deviceId:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
        clientType:
          type: string
        deviceId:
          type: string
    WechatMiniProgramLoginRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
        encryptedData:
          type: string
        iv:
          type: string
        clientType:
          type: string
        deviceId:
          type: string
    AuthResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshTokenExpiresAt:
          type: string
          format: date-time
    AuthResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AuthResponse'
        error:
          $ref: '#/components/schemas/ApiError'
        traceId:
          type: string
