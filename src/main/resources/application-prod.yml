spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:itodo}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  security:
    public-docs-enabled: false
    cors:
      allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS}

logging:
  level:
    root: INFO
    com.example.itodo: INFO
